<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis AI</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090B;color:#FAFAFA;font-family:Inter,-apple-system,sans-serif}
input,button,select{font-family:inherit}
input::placeholder{color:#52525B}
input:focus,select:focus{outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#27272A;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:#18181B;border:1px solid #27272A;border-radius:14px;padding:20px}
.btn{background:#6366F1;color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer}
.btn-ghost{background:transparent;border:1px solid #27272A;color:#A1A1AA}
.btn-out{background:transparent;border:1px solid #6366F1;color:#818CF8}
.inp{background:#111113;color:#fff;border:1px solid #27272A;border-radius:9px;padding:10px 14px;font-size:13px;width:100%}
.sidebar{width:210px;background:#111113;border-right:1px solid #27272A;height:100vh;position:sticky;top:0;display:flex;flex-direction:column}
.nav-item{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;font-size:13px}
.nav-item:hover{background:rgba(99,102,241,.1)}
.nav-item.active{background:rgba(99,102,241,.15);color:#818CF8;font-weight:600}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const SB="https://eaqktznqqbzjnwszpovw.supabase.co";
const SK="sb_publishable_JrKWlO_6CGCPeFkRtMLU7w_IS8965uD";
const H=t=>({apikey:SK,Authorization:"Bearer "+(t||SK),"Content-Type":"application/json",Prefer:"return=representation"});
const go=async(url,o)=>{try{const c=new AbortController();const id=setTimeout(()=>c.abort(),15000);const r=await fetch(url,{...o||{},signal:c.signal});clearTimeout(id);return r.json()}catch(e){return{error:true,message:e.message}}};
const api={in:(e,p)=>go(SB+"/auth/v1/token?grant_type=password",{method:"POST",headers:H(),body:JSON.stringify({email:e,password:p})}),up:(e,p,n,r)=>go(SB+"/auth/v1/signup",{method:"POST",headers:H(),body:JSON.stringify({email:e,password:p,data:{full_name:n,role:r}})})};

function Spin(){return<div style={{width:18,height:18,border:"2px solid #27272A",borderTopColor:"#6366F1",borderRadius:"50%",animation:"spin .7s linear infinite",display:"inline-block"}}/>}
function Logo({s=36}){return<svg width={s} height={s} viewBox="0 0 40 40"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#6366F1"/><stop offset="100%" stopColor="#22D3EE"/></linearGradient></defs><polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="url(#lg)" opacity=".12"/><polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="none" stroke="url(#lg)" strokeWidth="1.5"/><path d="M20 11s6-2.5 6 6v3s-2.5 7-6 7-6-7-6-7v-3s0-8.5 6-6z" fill="url(#lg)" opacity=".9"/></svg>}

function Login({onLogin,onSignup}){
const[em,sE]=useState("");const[pw,sP]=useState("");const[err,sErr]=useState("");const[loading,sL]=useState(false);
const go=async()=>{if(!em||!pw){sErr("Email and password required");return}sL(true);sErr("");const d=await api.in(em,pw);sL(false);if(d.access_token){onLogin(d)}else{sErr(d.message||"Login failed")}};
return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#09090B"}}><div style={{width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:24}}><Logo s={48}/><h2 style={{fontSize:24,fontWeight:800,marginTop:10}}>Welcome Back</h2><p style={{color:"#A1A1AA",fontSize:13}}>Sign in to Aegis AI</p></div><div className="card"><div style={{display:"flex",flexDirection:"column",gap:12}}><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Email</div><input className="inp" value={em} onChange={e=>sE(e.target.value)} placeholder="you@company.com"/></div><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Password</div><input className="inp" type="password" value={pw} onChange={e=>sP(e.target.value)} placeholder="••••••••"/></div>{err&&<div style={{fontSize:12,color:"#F43F5E",background:"rgba(244,63,94,.1)",padding:"8px 12px",borderRadius:7}}>{err}</div>}<button className="btn" onClick={go} disabled={loading} style={{width:"100%",padding:"12px"}}>{loading?<Spin/>:"Sign In"}</button></div><p style={{textAlign:"center",marginTop:16,fontSize:13,color:"#A1A1AA"}}>No account? <span onClick={onSignup} style={{color:"#818CF8",cursor:"pointer",fontWeight:600}}>Create one</span></p></div></div></div>}

function Signup({onLogin}){
const[form,sF]=useState({name:"",email:"",pw:"",co:"",role:"mgr"});const[err,sErr]=useState("");const[loading,sL]=useState(false);const[status,sSt]=useState("");
const f=k=>e=>sF({...form,[k]:e.target.value});
const go=async()=>{if(!form.name||!form.email||!form.pw||!form.co){sErr("All fields required");return}if(form.pw.length<6){sErr("Password min 6 characters");return}sL(true);sErr("");sSt("Creating account...");try{const d=await api.up(form.email,form.pw,form.name,form.role);if(d.user||d.access_token){sSt("Logging in...");const d2=await api.in(form.email,form.pw);if(d2.access_token){sSt("Account created!");sL(false);sSt("");onLogin(d2)}else{sL(false);sSt("");sErr("Account created! Please login.")}}else{sL(false);sSt("");sErr((d.message||"Signup failed").includes("already")?"Email already registered":d.message||"Signup failed")}}catch(e){sL(false);sSt("");sErr("Network error")}};
return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#09090B"}}><div style={{width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:20}}><Logo s={40}/><h2 style={{fontSize:20,fontWeight:800,marginTop:10}}>Create Account</h2><p style={{color:"#A1A1AA",fontSize:13}}>Free - no credit card needed</p></div><div className="card"><div style={{display:"flex",flexDirection:"column",gap:12}}><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Full Name</div><input className="inp" value={form.name} onChange={f("name")} placeholder="Raj Patel"/></div><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Work Email</div><input className="inp" value={form.email} onChange={f("email")} placeholder="raj@company.com"/></div><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Password</div><input className="inp" type="password" value={form.pw} onChange={f("pw")} placeholder="Min 6 characters"/></div><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Company Name</div><input className="inp" value={form.co} onChange={f("co")} placeholder="Acme Corp"/></div><div><div style={{fontSize:12,fontWeight:600,color:"#A1A1AA",marginBottom:6}}>Role</div><select className="inp" value={form.role} onChange={f("role")}><option value="ceo">CEO / Founder</option><option value="mgr">Engineering Manager</option><option value="dev">Developer</option></select></div>{err&&<div style={{fontSize:12,color:"#F43F5E",background:"rgba(244,63,94,.1)",padding:"8px 12px",borderRadius:7}}>{err}</div>}{status&&<div style={{fontSize:12,color:"#22D3EE",background:"rgba(34,211,238,.1)",padding:"8px 12px",borderRadius:7,display:"flex",alignItems:"center",gap:8}}><Spin/> {status}</div>}<button className="btn" onClick={go} disabled={loading} style={{width:"100%",padding:"12px"}}>{loading?"Creating...":"Create Account"}</button></div><p style={{textAlign:"center",marginTop:16,fontSize:13,color:"#A1A1AA"}}>Have account? <span onClick={onLogin} style={{color:"#818CF8",cursor:"pointer",fontWeight:600}}>Sign in</span></p></div></div></div>}

function App(){
const[sc,sSc]=useState("login");const[auth,sAuth]=useState(null);
const login=data=>{sAuth(data);sSc("app")};
if(sc==="login")return<Login onLogin={login} onSignup={()=>sSc("signup")}/>;
if(sc==="signup")return<Signup onLogin={login}/>;
return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#09090B"}}><div style={{textAlign:"center"}}><Logo s={64}/><h2 style={{marginTop:20}}>Welcome!</h2><p style={{color:"#A1A1AA",marginTop:10}}>You are logged in as {auth.user?.email}</p><button className="btn" style={{marginTop:20}} onClick={()=>{sAuth(null);sSc("login")}}>Logout</button></div></div>}

const el=document.getElementById("root");if(el)ReactDOM.createRoot(el).render(<App/>);
</script>
</body>
</html>
