const go = async function(url, options) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(function() { controller.abort(); }, 15000);
    const response = await fetch(url, Object.assign({}, options || {}, { signal: controller.signal }));
    clearTimeout(timeoutId);
    return await response.json();
  } catch (e) {
    return {
      error: true,
      message: e.name === "AbortError" ? "Slow internet" : e.message
    };
  }
};

const genCode = function() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

  for (var i = 0; i < 8; i++) {
    code = code + chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
};

const askGemini = async function(key, prompt) {
  var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + key;
  var r = await go(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if (r && r.error && typeof r.error === "object") {
    return { error: true, message: r.error.message || JSON.stringify(r.error) };
  }
  if (r && r.error === true) {
    return { error: true, message: r.message || "Network/fetch error" };
  }
  var text = r && r.candidates && r.candidates[0] && r.candidates[0].content && r.candidates[0].content.parts && r.candidates[0].content.parts[0] && r.candidates[0].content.parts[0].text;
  if (!text) {
    return { error: true, message: "Gemini response empty" };
  }
  return { error: false, text: text };
};
