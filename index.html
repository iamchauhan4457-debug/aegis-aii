const H = (token) => ({
  "apikey": SK,
  "Authorization": `Bearer ${token || SK}`,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
});

const go = async (url, options = {}) => {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);
    const response = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(timeoutId);
    const text = await response.text();
    try { return JSON.parse(text); } 
    catch(e) { return { error: true, message: text }; }
  } catch(e) {
    return { error: true, message: e.name === "AbortError" ? "Network timeout" : e.message };
  }
};

const session = {
  save: (data) => localStorage.setItem("aegis_session", JSON.stringify(data)),
  load: () => {
    try {
      const data = localStorage.getItem("aegis_session");
      return data ? JSON.parse(data) : null;
    } catch(e) { return null; }
  },
  clear: () => localStorage.removeItem("aegis_session")
};

const gemKey = {
  get: () => localStorage.getItem("aegis_gemini_key") || "",
  set: (v) => localStorage.setItem("aegis_gemini_key", v || "")

    headers: H(token)

  addComment: (token, userId, data) => go(`${SB}/rest/v1/comments`, {

    body: JSON.stringify({ ...data, user_id: userId })
  }),
  
  deleteComment: (token, id) => go(`${SB}/rest/v1/comments?id=eq.${id}`, {
    method: "DELETE",
    headers: H(token)
  }),
  
  getChatMessages: (token, projectId) => go(`${SB}/rest/v1/chat_messages?project_id=eq.${projectId}&order=created_at.asc`, {
    headers: H(token)
  }),
  
  sendChatMessage: (token, userId, data) => go(`${SB}/rest/v1/chat_messages`, {
    method: "POST",
    headers: H(token),
    body: JSON.stringify({ ...data, user_id: userId })
  }),
  
  getActivity: (token, companyId) => go(`${SB}/rest/v1/activity?company_id=eq.${companyId}&order=created_at.desc&limit=50`, {
    headers: H(token)
  })
};

// Login Page
function LoginPage({ onLogin, onSignup }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  
  const handleLogin = async () => {
    if (!email || !password) {
      setError('Email and password are required');
      return;
    }
    
    setLoading(true);
    setError('');
    
    const result = await api.login(email, password);
    setLoading(false);
    
    if (result.access_token) {
      onLogin(result);
    } else {
      setError(result.message || result.error_description || 'Login failed');
    }
  };
  
  return React.createElement('div', {
    style: {
      minHeight: '100vh', display: 'flex', alignItems: 'center',
      justifyContent: 'center', background: C.bg, padding: 20
    }
  },
    React.createElement('div', { style: { width: '100%', maxWidth: 400 } },

            value: password, onChange: e => setPassword(e.target.value),

          error && React.createElement('div', {
            style: {
              fontSize: 12, color: C.red, background: `${C.red}12`,
              padding: '8px 12px', borderRadius: 7
            }
          }, error),

function SignupPage({ onLogin }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [company, setCompany] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState('');
  
  const handleSignup = async () => {
    if (!name || !email || !password || !company) {
      setError('All fields are required');
      return;
    }
    if (password.length < 6) {
      setError('Password must be at least 6 characters');

// ===== MAIN APP =====
function App() {
  const [screen, setScreen] = useState('login');
  const [auth, setAuth] = useState(null);
  const [profile, setProfile] = useState(null);
  const [currentPage, setCurrentPage] = useState('dashboard');
  const [booting, setBooting] = useState(true);
  
  useEffect(() => {
    // Check for recovery token in URL
    const hash = window.location.hash;
    if (hash && hash.includes('type=recovery')) {
      const params = new URLSearchParams(hash.substring(1));
      const token = params.get('access_token');
      if (token) {
        // Handle password reset (simplified)
        window.history.replaceState(null, '', window.location.pathname);
      }
    }
    
    // Check for saved session
    const saved = session.load();
    if (saved && saved.access_token && saved.user) {
      api.getProfile(saved.access_token, saved.user.id)
        .then(p => {
          setAuth(saved);
          setProfile(p || { full_name: saved.user.email?.split('@')[0], role: 'mgr' });
          setScreen('app');
          setBooting(false);
        })
        .catch(() => {
          session.clear();
          setBooting(false);
        });
    } else {
      setBooting(false);
    }
  }, []);
  
  const handleLogin = async (data) => {
    setAuth(data);
    session.save(data);
    
    const profileData = await api.getProfile(data.access_token, data.user.id);
    setProfile(profileData || {
      full_name: data.user.email?.split('@')[0],
      role: 'mgr',
      company_id: null
    });
    
    setScreen('app');
    setCurrentPage('dashboard');
  };
  
  const handleLogout = async () => {
    if (auth) {
      try { await api.logout(auth.access_token); } catch(e) {}
    }
    session.clear();
    setAuth(null);
    setProfile(null);
    setScreen('login');
  };
  
  const handleSignup = () => setScreen('signup');
  const handleBackToLogin = () => setScreen('login');
  
  const navigate = (page) => setCurrentPage(page);
  
  const updateProfile = (data) => {
    setProfile({ ...profile, ...data });
  };
  
  if (booting) {
    return React.createElement('div', {
      style: {
        minHeight: '100vh', display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        background: C.bg
      }
    }, React.createElement(Spin));
  }
  
  // Login Screen
  if (screen === 'login') {
    return React.createElement(LoginPage, {
      onLogin: handleLogin,
      onSignup: handleSignup
    });
  }
  
  // Signup Screen
  if (screen === 'signup') {
    return React.createElement(SignupPage, {
      onLogin: handleLogin
    });
  }
  
  // App Screen
  const pageTitles = {
    dashboard: 'Dashboard',
    projects: 'Projects',
    risks: 'Risk Center',
    team: 'Team',
    settings: 'Settings'
  };
  
  const renderPage = () => {
    if (!auth) return null;
    
    const companyId = profile?.company_id;
    const token = auth.access_token;
    const userId = auth.user.id;
    const role = profile?.role || 'mgr';
    
    switch(currentPage) {
      case 'dashboard':
        return React.createElement(Dashboard, {
          user: auth.user,
          profile: profile,
          token: token,
          onNavigate: navigate
        });
        
      case 'projects':
        return React.createElement(ProjectsPage, {
          token: token,
          userId: userId,
          role: role,
          companyId: companyId,
          onNavigate: navigate
        });
        
      case 'risks':
        return React.createElement(RisksPage, {
          token: token,
          userId: userId,
          role: role,
          companyId: companyId
        });
        
      case 'team':
        return React.createElement(TeamPage, {
          token: token,
          companyId: companyId,
          userId: userId,
          role: role
        });
        
      case 'settings':
        return React.createElement(SettingsPage, {
          token: token,
          userId: userId,
          profile: profile,
          onUpdate: updateProfile,
          companyId: companyId
        });
        
      default:
        return React.createElement(Dashboard, {
          user: auth.user,
          profile: profile,
          token: token,
          onNavigate: navigate
        });
    }
  };
  
  return React.createElement('div', {
    style: {
      fontFamily: 'Inter, -apple-system, sans-serif',
      background: C.bg, minHeight: '100vh', color: C.txt
    }
  },
    React.createElement('div', {
      style: { display: 'flex', minHeight: '100vh' }
    },
      React.createElement(Sidebar, {
        user: auth?.user,
        profile: profile,
        currentPage: currentPage,
        onNavigate: navigate,
        onLogout: handleLogout
      }),
      React.createElement('div', {
        style: { flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }
      },
        React.createElement('header', {
          style: {
            height: 52, background: C.surf,
            borderBottom: `1px solid ${C.border}`,
            display: 'flex', alignItems: 'center',
            justifyContent: 'space-between',
            padding: '0 20px', fontSize: 14, fontWeight: 700,
            position: 'sticky', top: 0, zIndex: 10
          }
        },
          React.createElement('span', null, pageTitles[currentPage] || 'Dashboard')
        ),
        React.createElement('main', {
          style: { flex: 1, padding: 20, overflowY: 'auto' }
        }, renderPage())
      )
    )
  );
}
