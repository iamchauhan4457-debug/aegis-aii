<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis AI</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{background:#09090B;color:#FAFAFA;font-family:sans-serif;padding:20px}
.card{background:#18181B;border:1px solid #27272A;border-radius:14px;padding:20px;margin:10px 0}
.btn{background:#6366F1;color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;margin:4px}
input{background:#111113;color:#fff;border:1px solid #27272A;border-radius:9px;padding:10px;width:100%;margin:6px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

function Login(props) {
  const[em,sE]=useState("");
  const[pw,sP]=useState("");
  
  return (
    <div style={{maxWidth:400,margin:"0 auto"}}>
      <h2>Login</h2>
      <input value={em} onChange={e=>sE(e.target.value)} placeholder="Email" />
      <input value={pw} onChange={e=>sP(e.target.value)} type="password" placeholder="Password" />
      <button className="btn" onClick={()=>props.onLogin({email:em})}>Sign In</button>
      <p style={{marginTop:10}}>No account? <span style={{color:"#818CF8",cursor:"pointer"}} onClick={props.onSignup}>Create one</span></p>
    </div>
  );
}

function Signup(props) {
  const[form,sF]=useState({name:"",email:"",pw:"",co:""});
  
  return (
    <div style={{maxWidth:400,margin:"0 auto"}}>
      <h2>Create Account</h2>
      <input value={form.name} onChange={e=>sF({...form,name:e.target.value})} placeholder="Full Name" />
      <input value={form.email} onChange={e=>sF({...form,email:e.target.value})} placeholder="Email" />
      <input value={form.pw} onChange={e=>sF({...form,pw:e.target.value})} type="password" placeholder="Password" />
      <input value={form.co} onChange={e=>sF({...form,co:e.target.value})} placeholder="Company Name" />
      <button className="btn" onClick={()=>alert("Signup: "+form.name)}>Create Account</button>
      <p style={{marginTop:10}}>Have account? <span style={{color:"#818CF8",cursor:"pointer"}} onClick={props.onLogin}>Sign in</span></p>
    </div>
  );
}

function Dashboard(props) {
  return (
    <div style={{maxWidth:600,margin:"0 auto"}}>
      <h2>Welcome, {props.user.name}!</h2>
      <p>Company: {props.user.co}</p>
      <div className="card">
        <h3>Dashboard</h3>
        <p>Total Projects: 0</p>
        <p>Status: Active</p>
      </div>
      <button className="btn" onClick={props.onLogout}>Logout</button>
    </div>
  );
}

function App() {
  const[page,sPage]=useState("login");
  const[user,sUser]=useState(null);
  
  if(page==="dashboard" && user) {
    return <Dashboard user={user} onLogout={()=>{sUser(null);sPage("login")}} />;
  }
  
  if(page==="signup") {
    return <Signup onLogin={()=>sPage("login")} />;
  }
  
  return <Login onLogin={(data)=>{sUser(data);sPage("dashboard")}} onSignup={()=>sPage("signup")} />;
}

const el = document.getElementById("root");
if(el) {
  const r = ReactDOM.createRoot(el);
  r.render(<App />);
}
</script>
</body>
</html>
