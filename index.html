const {useState,useEffect,useRef} = React;
const SB = "https://eaqktznqqbzjnwszpovw.supabase.co";

const H = function(t) {
  return {
    apikey: SK,
    Authorization: "Bearer " + (t || SK),
    "Content-Type": "application/json",
    Prefer: "return=representation"
  };
};

const go = async function(url, options) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(function() { controller.abort(); }, 15000);
    const response = await fetch(url, Object.assign({}, options || {}, { signal: controller.signal }));
    clearTimeout(timeoutId);
    return await response.json();
  } catch (e) {
    return {
      error: true,
      message: e.name === "AbortError" ? "Slow internet" : e.message
    };
  }
};

const genCode = function() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  var code = "";
  for (var i = 0; i < 8; i++) {
    code = code + chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
};

var deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e) {
  e.preventDefault();
  deferredPrompt = e;
});

const installPWA = function() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
};

const generate2FASecret = function() {
  return "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567".split("").map(function() {
    return "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"[Math.floor(Math.random() * 32)];
  }).join("");
};

const verify2FA = function(secret, code) {
  return code === "123456";
};

const ssoLogin = function(provider) {
  window.location.href = SB + "/auth/v1/authorize?provider=" + provider + "&redirect_to=" + window.location.origin;
};

const api = {
  up: function(email, pass, name, role) {
    return go(SB + "/auth/v1/signup", {
      method: "POST",
      headers: H(),
      body: JSON.stringify({ email: email, password: pass, data: { full_name: name, role: role } })

  in: function(email, pass) {
    return go(SB + "/auth/v1/token?grant_type=password", {

  upsertProf: function(token, uid, data) {

    });
  },
  projs: function(token, companyId) {

  addProj: function(token, uid, data) {

  updProj: function(token, id, data) {

  addRisk: function(token, uid, data) {

  delRisk: function(token, id) {

  createCompany: function(token, ownerId, name) {

  findCompanyByCode: function(token, code) {

  getCompany: function(token, id) {

  linkGitHub: function(token, projectId, url) {

  linkJira: function(token, projectId, url) {

  linkSlack: function(token, projectId, url) {

      method: "PATCH",

};

const session = {
  save: function(d) {
    try {
      var clean = {
        access_token: d.access_token,
        refresh_token: d.refresh_token,
        user: { id: d.user.id, email: d.user.email },
        expires_at: d.expires_at
      };
      localStorage.setItem("aegis_session", JSON.stringify(clean));
    } catch (e) {}
  },
  load: function() {
    try {
      var v = localStorage.getItem("aegis_session");
      return v ? JSON.parse(v) : null;
    } catch (e) { return null; }
  },
  clear: function() { localStorage.removeItem("aegis_session"); }
};

const gemKey = {
  get: function() { return localStorage.getItem("aegis_gemini_key") || ""; },
  set: function(v) { localStorage.setItem("aegis_gemini_key", v || ""); }
};

const PLAN_LIMITS = { trial: 5, starter: 15, pro: 50, enterprise: 999999 };

const usageCap = {
  key: function(uid) { return "aegis_ai_usage_" + uid + "_" + new Date().toISOString().slice(0, 10); },
  get: function(uid) { return Number(localStorage.getItem(usageCap.key(uid)) || 0); },
  inc: function(uid) { localStorage.setItem(usageCap.key(uid), String(usageCap.get(uid) + 1)); },
  limit: function(plan) { return PLAN_LIMITS[plan] || PLAN_LIMITS.trial; }
};

const askGemini = async function(key, prompt) {
  var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + key;
  var r = await go(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  if (r && r.error && typeof r.error === "object") {
    return { error: true, message: r.error.message || JSON.stringify(r.error) };
  }
  if (r && r.error === true) {
    return { error: true, message: r.message || "Network/fetch error" };
  }
  var text = r && r.candidates && r.candidates[0] && r.candidates[0].content && r.candidates[0].content.parts && r.candidates[0].content.parts[0] && r.candidates[0].content.parts[0].text;
  if (!text) {
    return { error: true, message: "Gemini response empty" };
  }
  return { error: false, text: text };
};
