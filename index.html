<div id="root"></div>

const {useState,useEffect,useRef} = React;

const C = {

    React.createElement("defs", null,

  );
}

function App() {
  return React.createElement("div", null,
    React.createElement(Logo, { s: 48 }),
    React.createElement("h1", { style: { marginTop: 10 } }, "Part 2 PASS!"),
    React.createElement("p", { style: { color: C.green } }, "Logo + Spin components working!"),
    React.createElement(Spin)
  );
}

const el = document.getElementById("root");
if (el) {
  const r = ReactDOM.createRoot(el);
  r.render(React.createElement(App));
}
</script>
